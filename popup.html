<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 280px; /* Чуть уже */
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 10px;
      background-color: #ffffff;
      font-size: 12px; /* Чуть меньше шрифт */
    }
    .header {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid #eee;
    }
    .header img { width: 20px; height: 20px; margin-right: 6px; }
    .header h3 { margin: 0; color: #333; font-size: 14px; }

    /* Toggle Switch */
    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px; /* Компактнее */
    }
    .label { color: #444; }
    
    .switch {
      position: relative;
      display: inline-block;
      width: 36px; /* Чуть меньше тумблер */
      height: 18px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ccc;
      transition: .3s;
      border-radius: 18px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 12px;
      width: 12px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }
    input:checked + .slider { background-color: #4CAF50; }
    input:checked + .slider:before { transform: translateX(18px); }

    input[type=number] {
      width: 35px;
      padding: 1px;
      border: 1px solid #ddd;
      border-radius: 3px;
      text-align: center;
    }

    #historyBtn {
      width: 100%; padding: 6px; background-color: #4CAF50; color: white;
      border: none; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold;
      margin-top: 5px;
    }
    #historyBtn:hover { background-color: #45a049; }

    #filterContainer {
      display: none; 
      margin-top: 6px; padding: 4px; background: #f9f9f9; border-radius: 4px; 
      flex-wrap: wrap; gap: 4px;
    }
    .filter-chip {
      padding: 2px 5px; background: #fff; border: 1px solid #ddd;
      border-radius: 8px; font-size: 10px; cursor: pointer; display: flex;
      align-items: center; opacity: 0.6; transition: 0.2s;
    }
    .filter-chip.active { opacity: 1; border-color: #4CAF50; background: #f1f8e9; }
    .filter-chip img { width: 10px; height: 10px; margin-right: 3px; }

    #historyContainer {
      margin-top: 6px; max-height: 200px; overflow-y: auto; display: none;
      border-top: 1px solid #eee; padding-top: 4px;
    }
    .history-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px; margin-bottom: 2px; background: #fff; border-radius: 3px; 
      border: 1px solid #f0f0f0; cursor: pointer;
    }
    .history-item:hover { background: #f9f9f9; }
    
    .h-info { display: flex; align-items: center; flex: 1; min-width: 0; }
    .h-icon { width: 12px; height: 12px; margin-right: 4px; flex-shrink: 0; }
    .h-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 10px; color: #333; }
    .h-meta { font-size: 9px; color: #999; margin-left: 4px; white-space: nowrap; }

    .delete-btn {
      background: none; border: none; color: #ccc; cursor: pointer; 
      padding: 1px; font-size: 12px; margin-left: 4px;
    }
    .delete-btn:hover { color: #ff5252; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon.png" alt="Icon">
    <h3>AI Chat Navigator</h3>
  </div>

  <div class="setting-row">
    <span class="label">Chat Navigation</span>
    <label class="switch"><input type="checkbox" id="navToggle" checked><span class="slider"></span></label>
  </div>
  
  <div class="setting-row">
    <span class="label">Block Auto-Scroll</span>
    <label class="switch"><input type="checkbox" id="scrollToggle" checked><span class="slider"></span></label>
  </div>

  <div class="setting-row">
    <span class="label">Dark Mode</span>
    <label class="switch"><input type="checkbox" id="themeToggle"><span class="slider"></span></label>
  </div>

  <div class="setting-row">
    <span class="label">Snippet (chars)</span>
    <input type="number" id="snippetLen" min="10" max="100" value="40">
  </div>

  <button id="historyBtn">View History</button>
  <div id="filterContainer"></div>
  <div id="historyContainer"></div>

  <script src="popup.js"></script>
</body>
</html>
